configuration:
  session_password:
    name: Session Password
    description: >-
      Password used to encrypt browser sessions. Leave empty to auto-generate one.
      Must be at least 32 characters if set manually.
  trefle_api_token:
    name: Trefle API Token
    description: >-
      Optional Trefle API token for plant species search. 
      Get one at https://trefle.io/
  upload_path:
    name: Upload Storage Path
    description: >-
      Optional path inside the add-on container to store uploaded plant photos.
      Use a NAS mount path (e.g., /media/truenas/plant-photos).
      Check the add-on logs at startup to see available mounts under /media.
      The directory will be created if it does not exist.
      Leave empty to use the default add-on storage (/data/uploads).