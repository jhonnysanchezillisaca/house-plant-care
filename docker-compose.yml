services:
  plant-care:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: house-plant-care
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/public/uploads
    environment:
      - NUXT_SESSION_PASSWORD=${NUXT_SESSION_PASSWORD:-change-me-to-a-secure-random-string}
      - TREFLE_API_TOKEN=${TREFLE_API_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s