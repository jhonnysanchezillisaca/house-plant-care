name: Build and Push HA Add-on

on:
  push:
    branches:
      - main

env:
  REGISTRY: gitea.home.arpa
  IMAGE_NAME: jhonny/house-plant-care

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ha-addon/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Cleanup old package versions
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          echo "Fetching package versions..."
          VERSIONS=$(curl -sk -H "Authorization: token $GITEA_TOKEN" \
            "https://gitea.home.arpa/api/v1/packages/jhonny/container/house-plant-care/versions" \
            | jq -r '.[] | "\(.id) \(.created_at)"' | sort -t' ' -k2 -r)

          COUNT=$(echo "$VERSIONS" | wc -l | tr -d ' ')
          echo "Found $COUNT package version(s)"

          if [ "$COUNT" -gt 1 ]; then
            echo "$VERSIONS" | tail -n +2 | while read VID DATE; do
              echo "Deleting old version: $VID"
              curl -sk -X DELETE \
                -H "Authorization: token $GITEA_TOKEN" \
                "https://gitea.home.arpa/api/v1/packages/jhonny/container/house-plant-care/version/$VID"
            done
            echo "Cleanup complete."
          else
            echo "Only one version found, nothing to clean up."
          fi

      - name: Sync add-on config to ha-addon-repo
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          git clone https://jhonny:${GITEA_TOKEN}@gitea.home.arpa/jhonny/ha-addon-repo.git /tmp/ha-addon-repo
          cd /tmp/ha-addon-repo

          cp ${{ github.workspace }}/ha-addon/config.yaml house_plant_care/config.yaml
          cp ${{ github.workspace }}/ha-addon/DOCS.md house_plant_care/DOCS.md
          cp -r ${{ github.workspace }}/ha-addon/translations/* house_plant_care/translations/

          git config user.name "Gitea Actions"
          git config user.email "actions@gitea.home.arpa"
          git add -A
          git diff --cached --quiet || git commit -m "auto-sync add-on config"
          git push